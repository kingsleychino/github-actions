name: 'Custom Env Vars'

on:
  workflow_dispatch:

env:
  DAY_OF_WEEK: Friday
  testvar: value-1

jobs:
  mainjob:
    name: 'Print the env vars'
    runs-on: ubuntu-latest

    env:
      Greeting: Dear
      testvar: value-2

    steps:
      - name: Print-value-of-env-vars
        run: |
          echo "$Greeting $First_Name. Todat is $DAY_OF_WEEK!"
          echo "testvar $testvar"
          echo "testvar ${{ env.testvar }}"
        env:
          First_Name: Student
          testvar: value-3
